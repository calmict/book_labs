# cap21 solution - readiness-aware dependencies. db declares a healthcheck and
# signals readiness only after a delay (like a real service); web waits for db to be
# HEALTHY, not just started, with depends_on condition: service_healthy. Compose then
# holds web's startup until db's healthcheck passes.
services:
  db:
    image: busybox
    command: ["sh", "-c", "sleep 4; touch /tmp/ready; sleep 3600"]
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/ready"]
      interval: 1s
      timeout: 2s
      retries: 10
      start_period: 1s
  web:
    image: busybox
    command: ["sh", "-c", "sleep 3600"]
    depends_on:
      db:
        condition: service_healthy
