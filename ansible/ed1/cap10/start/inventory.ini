# Chapter 10 — two tiers: the web group (web1, web2) and the db group (db1),
# all reached as the non-root 'deploy' user (passwordless sudo -> become).
[web]
web1 ansible_port=2311
web2 ansible_port=2312

[db]
db1 ansible_port=2313

[all:vars]
ansible_host=127.0.0.1
ansible_user=deploy
ansible_ssh_private_key_file=/tmp/cap10-lab/key
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
