# Chapter 12 solution — two web hosts. group_vars/ and host_vars/ sit next to
# this file, so the variables are found for the whole group and for web2 alone.
[web]
web1 ansible_port=2331
web2 ansible_port=2332

[all:vars]
ansible_host=127.0.0.1
ansible_user=deploy
ansible_ssh_private_key_file=/tmp/cap12-lab/key
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
