---
- name: A resilient deploy across the fleet
  hosts: all
  gather_facts: false
  force_handlers: true
  vars:
    lab: "{{ lookup('env', 'CAP22_LAB') | default('/tmp/cap22-lab', true) }}"
    deploy_env: dev
    fail_host: db1
  tasks:
    - name: Ensure the lab dir exists
      ansible.builtin.file:
        path: "{{ lab }}"
        state: directory
        mode: "0755"

    # TODO 3 (22.7) - validate the preconditions BEFORE acting.
    - name: deploy_env must be one we know
      ansible.builtin.assert:
        that: deploy_env in ['dev', 'staging', 'prod']
        fail_msg: "invalid deploy_env '{{ deploy_env }}'"

    # TODO 1 (22.2) - the deploy wrapped in block/rescue/always.
    - name: Deploy with rollback safety
      block:
        - name: Deploy the app
          ansible.builtin.copy:
            content: "deployed {{ deploy_env }}\n"
            dest: "{{ lab }}/{{ inventory_hostname }}.deployed"
            mode: "0644"
        - name: Simulate a mid-deploy failure on one host
          ansible.builtin.command: /bin/false
          when: inventory_hostname == fail_host
          changed_when: false
      rescue:
        - name: Roll back
          ansible.builtin.copy:
            content: "rolled back\n"
            dest: "{{ lab }}/{{ inventory_hostname }}.rollback"
            mode: "0644"
      always:
        - name: Clean up (always runs)
          ansible.builtin.copy:
            content: "cleaned up\n"
            dest: "{{ lab }}/{{ inventory_hostname }}.cleanup"
            mode: "0644"

    # TODO 2 (22.5) - the slow health check, retried until healthy.
    - name: Health check (slow - retry until healthy)
      ansible.builtin.shell: 'f="{{ lab }}/{{ inventory_hostname }}.hc"; echo x >> "$f"; test "$(wc -l < "$f")" -ge 3'
      register: hc
      until: hc.rc == 0
      retries: 5
      delay: 0
      changed_when: false

    - name: Send optional metrics (non-critical - ignore if it fails)
      ansible.builtin.command: /bin/false
      ignore_errors: true
      changed_when: false

    - name: Confirm no stale lock (rc=1 just means 'not found', not an error)
      ansible.builtin.command: "grep -q deploy-lock {{ lab }}/{{ inventory_hostname }}.deployed"
      register: lockcheck
      failed_when: false
      changed_when: false

    - name: Signal the reload
      ansible.builtin.copy:
        content: "reload requested\n"
        dest: "{{ lab }}/{{ inventory_hostname }}.reload"
        mode: "0644"
      notify: reload the app

  handlers:
    - name: reload the app
      ansible.builtin.copy:
        content: "reloaded\n"
        dest: "{{ lab }}/{{ inventory_hostname }}.reloaded"
        mode: "0644"
