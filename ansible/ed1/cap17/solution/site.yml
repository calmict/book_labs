---
# Chapter 17 solution — ansible.builtin modules (always present) alongside a
# community.general module, each called by its full name (FQCN). The collection
# module is idempotent just like the built-ins.

- name: Standing on the shoulders of giants
  hosts: local
  gather_facts: false
  vars:
    conf_path: /tmp/cap17/app.ini
  tasks:
    - name: Ensure the target directory (ansible.builtin — always present)
      ansible.builtin.file:
        path: "{{ conf_path | dirname }}"
        state: directory
        mode: "0755"

    - name: Manage an INI key with a collection module
      community.general.ini_file:
        path: "{{ conf_path }}"
        section: server
        option: port
        value: "8080"
        mode: "0644"

    - name: Read the file back (ansible.builtin.slurp)
      ansible.builtin.slurp:
        src: "{{ conf_path }}"
      register: ini

    - name: Show the result
      ansible.builtin.debug:
        msg: "{{ ini.content | b64decode }}"
