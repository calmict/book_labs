# A fleet of 12 nodes. They are all local (ansible_connection=local) so the
# exercise costs nothing, but each carries a different amount of work: t1 and t2
# are the seconds the two rollout steps take on that node. The spread is the
# point - some nodes are quick, some are slow, and a slow node must not hold the
# quick ones hostage.
[fleet]
node01 ansible_connection=local t1=2 t2=3
node02 ansible_connection=local t1=3 t2=1
node03 ansible_connection=local t1=1 t2=2
node04 ansible_connection=local t1=2 t2=3
node05 ansible_connection=local t1=3 t2=1
node06 ansible_connection=local t1=1 t2=2
node07 ansible_connection=local t1=2 t2=3
node08 ansible_connection=local t1=3 t2=1
node09 ansible_connection=local t1=1 t2=2
node10 ansible_connection=local t1=2 t2=3
node11 ansible_connection=local t1=3 t2=1
node12 ansible_connection=local t1=1 t2=2
