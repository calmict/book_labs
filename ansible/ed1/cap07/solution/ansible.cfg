# Chapter 7 — a production rulebook, commented line by line (the manual's 7.5).
# Remember the hierarchy: the first file found wins OUTRIGHT — if this file is
# active, nothing is inherited from ~/.ansible.cfg or /etc/ansible/ansible.cfg.
# Verify what is active and where each value comes from with:
#   ansible-config dump --only-changed

[defaults]
# The address book: pin it to the project so every command uses the same one.
inventory = ./inventory.ini

# Parallel hosts. The default (5) is timid for a real fleet; raise it to what
# your control node and network can take (chapter 25 measures this).
forks = 10

# NOTE what is NOT here: host_key_checking. The default (True) is a defense
# (chapter 3) — in production you keep it and manage known_hosts instead.
# Setting it to False belongs in a lab cfg only.

# Fail on typos in play/task keywords instead of silently ignoring them.
error_on_undefined_vars = True

[privilege_escalation]
# Do NOT default become to True in production: privilege is a per-play decision
# (chapter 11). Declaring it in the play makes the intent visible and reviewable.
become = False

[ssh_connection]
# Fewer SSH round-trips per task: big win, tiny cost. Requires no requiretty on
# the targets' sudoers (modern distros are fine).
pipelining = True

# Reuse SSH connections between tasks (chapter 3's ControlMaster as a setting).
# The socket path must stay SHORT (~108 char limit).
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
control_path_dir = /tmp/.ansible-cp
