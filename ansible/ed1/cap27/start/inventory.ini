# A web farm of 6 nodes behind one load balancer. Everything is local
# (ansible_connection=local) so the exercise costs nothing; on a real system the
# webfarm hosts would be your backends and balancer your load balancer.
[webfarm]
web1 ansible_connection=local
web2 ansible_connection=local
web3 ansible_connection=local
web4 ansible_connection=local
web5 ansible_connection=local
web6 ansible_connection=local

[lb]
balancer ansible_connection=local
