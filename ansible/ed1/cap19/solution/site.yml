---
- name: Become root with a password fetched from the caveau at runtime
  hosts: web
  become: true
  gather_facts: false
  tasks:
    - name: Ensure the app config directory exists
      ansible.builtin.file:
        path: /etc/myapp
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Write a root-owned marker (proves become worked)
      ansible.builtin.copy:
        content: "secret never touched disk\n"
        dest: /etc/cap19-marker.txt
        owner: root
        group: root
        mode: "0644"

    # no_log keeps the secret this task handles out of the logs, even at -vvv.
    - name: Configure the app with its DB credential
      ansible.builtin.copy:
        content: "db_password={{ app_db_password }}\n"
        dest: /etc/myapp/db.conf
        owner: root
        group: root
        mode: "0600"
      no_log: true

    - name: Confirm we became root
      ansible.builtin.command: id -un
      register: who
      changed_when: false

    - name: Show privilege (never the secret)
      ansible.builtin.debug:
        msg: "became {{ who.stdout }}"
