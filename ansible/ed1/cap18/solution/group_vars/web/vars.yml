# The sudo password is no longer here in clear text: it is an INDIRECTION to a
# value that lives, encrypted, in vault.yml next to this file. This plaintext
# file shows the SHAPE (which variables exist); the vault holds the values.
ansible_become_password: "{{ vault_become_password }}"

# A single secret, encrypted inline with ansible-vault encrypt_string. The
# file around it stays readable; only this one value is ciphertext.
