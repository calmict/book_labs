# Chapter 9 — two web hosts, reached as the non-root 'deploy' user. deploy has
# passwordless sudo, so an ad-hoc command with -b escalates to root. Verify with:
#   ansible -i inventory.ini web -m ping
[web]
web1 ansible_port=2291
web2 ansible_port=2292

# where they really are and how to reach them (see chapter 8).
[all:vars]
ansible_host=127.0.0.1
ansible_user=deploy
ansible_ssh_private_key_file=/tmp/cap09-lab/key
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
