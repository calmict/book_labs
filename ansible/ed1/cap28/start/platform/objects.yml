# AWX / Automation Platform objects, defined as code (GitOps): this is what your CI
# validates and then imports into the controller. No secret value lives here - only
# a reference to where the controller fetches it at run time.

projects:
  - name: infra-playbooks
    scm_type: git
    scm_url: https://example.com/acme/infra-playbooks.git

inventories:
  - name: production
    source: static

credentials:
  - name: deploy-ssh
    kind: machine
    # The value is NEVER stored here: the controller resolves it at run time from a
    # secret manager (chapter 19). Only this reference travels in git.
    secret: "{{ lookup('community.hashi_vault.vault_kv2_get', 'ansible/deploy-ssh').secret.ssh_key }}"

job_templates:
  # TODO 1 (28.3) - complete the deploy job template. A job template binds a playbook
  #   to the objects it runs against, and every reference must resolve. Give it:
  #       project: infra-playbooks
  #       playbook: deploy.yml
  #       credentials: [deploy-ssh]
  #   and a limit: webfarm (the rolling update of chapter 27 targets the web farm).
  - name: deploy
    inventory: production
    # project: ...
    # playbook: ...
    # credentials: [...]
    # limit: ...
  - name: smoke-test
    project: infra-playbooks
    inventory: production
    playbook: smoke.yml
    credentials: [deploy-ssh]
  - name: rollback
    project: infra-playbooks
    inventory: production
    playbook: rollback.yml
    credentials: [deploy-ssh]

rbac:
  # TODO 2 (28.4) - least privilege. This grant is far too broad: it makes the
  #   deployers team ADMIN over the whole organisation. Narrow it so the team may
  #   only EXECUTE the deploy job template, and nothing else:
  #       role: execute
  #       resource: job_template:deploy
  - team: deployers
    role: admin
    resource: organization:acme

workflows:
  - name: release
    # TODO 3 (28.5) - wire the workflow. The nodes are here but not connected. Add
    #   the edges so that: deploy on SUCCESS runs smoke-test; deploy on FAILURE runs
    #   rollback; smoke-test on FAILURE runs rollback. Use success_nodes /
    #   failure_nodes, each listing the id of the node to run next.
    nodes:
      - id: n_deploy
        job_template: deploy
        # success_nodes: [...]
        # failure_nodes: [...]
      - id: n_smoke
        job_template: smoke-test
        # failure_nodes: [...]
      - id: n_rollback
        job_template: rollback
