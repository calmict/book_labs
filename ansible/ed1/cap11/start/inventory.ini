# Chapter 11 — two caretaker policies. web1 is reached as 'deploy' (NOPASSWD
# sudo); web2 as 'secops' (sudo requires a password).
[nopass]
web1 ansible_port=2321 ansible_user=deploy

[withpass]
# TODO 2: secops can sudo but MUST supply a password. Give this host its
# ansible_become_password — the value is "secops-pw" for the lab. In production
# this is NEVER in plaintext: you encrypt it with Ansible Vault (chapter 18).
web2 ansible_port=2322 ansible_user=secops

[all:vars]
ansible_host=127.0.0.1
ansible_ssh_private_key_file=/tmp/cap11-lab/key
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
