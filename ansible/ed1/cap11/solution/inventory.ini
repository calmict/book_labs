# Chapter 11 solution — the completed inventory. web2 (secops) now carries its
# ansible_become_password, so it can clear the caretaker's password gate.
# In production this value is encrypted with Ansible Vault (chapter 18), never
# left in plaintext as it is here for the lab.
[nopass]
web1 ansible_port=2321 ansible_user=deploy

[withpass]
web2 ansible_port=2322 ansible_user=secops ansible_become_password=secops-pw

[all:vars]
ansible_host=127.0.0.1
ansible_ssh_private_key_file=/tmp/cap11-lab/key
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
