# Chapter 14 — two web hosts, reached as the non-root 'deploy' user.
[web]
web1 ansible_port=2341
web2 ansible_port=2342

[all:vars]
ansible_host=127.0.0.1
ansible_user=deploy
ansible_ssh_private_key_file=/tmp/cap14-lab/key
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
