---
# Chapter 15 — adaptive provisioning (starting point). Check it first:
#   ansible-playbook -i inventory.ini site.yml --syntax-check
# Fill TODO 1 (the users loop), TODO 2 (the composite when), TODO 3 (register +
# when), then run it different ways:
#   ansible-playbook -i inventory.ini site.yml
#   ansible-playbook -i inventory.ini site.yml -e app_env=prod -e enable_metrics=true -e tuning_profile=fast

- name: Adaptive provisioning
  hosts: web
  become: true
  gather_facts: false
  vars:
    # NOTE: the variable is app_env, not 'environment' — the latter is a
    # reserved Ansible keyword (it sets a task's environment variables).
    app_env: dev
    enable_metrics: false
    app_users:
      - name: websvc
        shell: /bin/bash
      - name: batchsvc
        shell: /usr/sbin/nologin
    feature_dirs:
      - logs
      - cache
      - run
  tasks:
    - name: Ensure the base directory
      ansible.builtin.file:
        path: /srv/app
        state: directory
        mode: "0755"

    - name: Create the feature directories (loop over a list)
      ansible.builtin.file:
        path: "/srv/app/{{ item }}"
        state: directory
        mode: "0755"
      loop: "{{ feature_dirs }}"

    # TODO 1: create the application users with a loop over app_users, a LIST OF
    # DICTS. Use item.name and item.shell, and add a loop_control label so the
    # output shows the user name, not the whole dict.
    #   loop: "{{ app_users }}"
    #   loop_control:
    #     label: "{{ item.name }}"
    - name: Create the application users
      ansible.builtin.user:
        name: "{{ item.name }}"
        shell: "{{ item.shell }}"
        create_home: false

    - name: Drop the production marker (prod only)
      ansible.builtin.copy:
        content: "PROD\n"
        dest: /srv/app/PRODUCTION
        mode: "0644"
      when: app_env == 'prod'

    # TODO 2: enable metrics ONLY in prod AND only when requested. Use a list
    # under 'when' (a list means AND):
    #   when:
    #     - app_env == 'prod'
    #     - enable_metrics | bool
    - name: Enable metrics (prod AND enabled)
      ansible.builtin.file:
        path: /srv/app/metrics.enabled
        state: touch
        mode: "0644"

    - name: Apply optional tuning (only if the variable exists)
      ansible.builtin.copy:
        content: "tuning={{ tuning_profile | default('') }}\n"
        dest: /srv/app/tuning.conf
        mode: "0644"
      when: tuning_profile is defined

    - name: Look for the first-run sentinel
      ansible.builtin.stat:
        path: /srv/app/.provisioned
      register: sentinel

    # TODO 3: run this task only on the first run — when the sentinel does NOT
    # exist yet. Reference the registered result:
    #   when: not sentinel.stat.exists
    - name: First-time provisioning
      ansible.builtin.copy:
        content: "first run\n"
        dest: /srv/app/firstrun.txt
        mode: "0644"

    - name: Write the first-run sentinel
      ansible.builtin.copy:
        content: "done\n"
        dest: /srv/app/.provisioned
        mode: "0644"
