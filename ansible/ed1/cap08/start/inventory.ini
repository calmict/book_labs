# Chapter 8 — your address book (starting point). Verify it with:
#   ansible-inventory -i inventory.ini --graph

# TODO 1: the web section. Add web1 (port 2281) and web2 (port 2282), following
# the [db] example below: a logical name + its per-host variables on the line.
[web]

# example, already done for you:
[db]
db1 ansible_port=2283

# TODO 2: the group of groups. prod should contain the GROUPS web and db (not
# hosts). Use the :children suffix, one group name per line.
[prod:children]

# a range: three hosts in one line (they need not exist to be listed).
[edge]
edge[01:03].lab.internal

# variables shared by every host: where they really are and how to reach them.
[all:vars]
ansible_host=127.0.0.1
ansible_user=root
ansible_ssh_private_key_file=/tmp/cap08-lab/key
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
