# Chapter 8 — the completed address book (INI). Verify with:
#   ansible-inventory -i inventory.ini --graph

[web]
web1 ansible_port=2281
web2 ansible_port=2282

[db]
db1 ansible_port=2283

# a group of groups: prod is web + db (its members are GROUPS, not hosts)
[prod:children]
web
db

# a range: three fictional hosts declared in one line
[edge]
edge[01:03].lab.internal

# variables shared by every host: where they really are and how to reach them
[all:vars]
ansible_host=127.0.0.1
ansible_user=root
ansible_ssh_private_key_file=/tmp/cap08-lab/key
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
