# Two operators answering with their own name, and the switchboard
# (Service) in front of them.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: helpdesk
  labels:
    app: helpdesk
spec:
  replicas: 2
  selector:
    matchLabels:
      app: helpdesk
  template:
    metadata:
      labels:
        app: helpdesk
    spec:
      containers:
        - name: operator
          image: busybox:stable
          command: ["sh", "-c", "mkdir -p /www; hostname > /www/index.html; httpd -f -p 8080 -h /www"]
---
apiVersion: v1
kind: Service
metadata:
  name: helpdesk
spec:
  # TODO: the switchboard — a selector matching the operators' label,
  # and one port: 80 outside, towards 8080 inside (targetPort)
