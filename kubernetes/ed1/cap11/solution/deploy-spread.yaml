apiVersion: apps/v1
kind: Deployment
metadata:
  name: spread
spec:
  replicas: 2
  # Recreate: with a strict anti-affinity, a rolling update can deadlock
  # (no free node for the surge pod) — a taste of more advanced traps.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: spread
  template:
    metadata:
      labels:
        app: spread
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: spread
              topologyKey: kubernetes.io/hostname
      containers:
        - name: sleeper
          image: alpine:3
          command: ["sleep", "infinity"]
