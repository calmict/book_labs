# Traffic management: 80% to v1, 20% to v2. Shifting these weights is a
# canary rollout, decided from above, with no change to the app.
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: web
  namespace: mesh
spec:
  host: web
  subsets:
    - name: v1
      labels:
        version: v1
    - name: v2
      labels:
        version: v2
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: web
  namespace: mesh
spec:
  hosts:
    - web
  http:
    - route:
        - destination:
            host: web
            subset: v1
          weight: 80
        - destination:
            host: web
            subset: v2
          weight: 20
