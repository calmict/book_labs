# The reader's round, completed: Prometheus scrapes itself AND the node
# meter. After applying, restart the prometheus deployment so it re-reads.
apiVersion: v1
kind: ConfigMap
metadata:
  name: prom-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
      - job_name: node
        static_configs:
          - targets: ["node-exporter:9100"]
