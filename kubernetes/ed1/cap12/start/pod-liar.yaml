apiVersion: v1
kind: Pod
metadata:
  name: liar
spec:
  containers:
    - name: liar
      image: alpine:3
      # healthy for twenty seconds, then it lies: the process keeps
      # running while the health file is gone
      command: ["sh", "-c", "touch /tmp/healthy; sleep 20; rm /tmp/healthy; sleep infinity"]
      # TODO: add the doctor — a livenessProbe that execs
      # cat /tmp/healthy every 5 seconds (initialDelaySeconds 5)
