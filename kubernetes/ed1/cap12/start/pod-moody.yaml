apiVersion: v1
kind: Pod
metadata:
  name: moody
  labels:
    app: moody
spec:
  containers:
    - name: moody
      image: alpine:3
      command: ["sh", "-c", "touch /tmp/ready; sleep infinity"]
      # TODO: add the mood detector — a readinessProbe that execs
      # test -f /tmp/ready every 3 seconds (failureThreshold 2)
---
apiVersion: v1
kind: Service
metadata:
  name: moody
spec:
  selector:
    app: moody
  ports:
    - port: 80
