# The local certificate authority, built in three steps:
#   1. a SelfSigned ClusterIssuer (signs things with no authority above it)
#   2. a CA Certificate signed by it — our local root of trust
#   3. a CA ClusterIssuer that uses that root to sign the real leaf certs
# In production the authority would be Let's Encrypt via ACME; here, with no
# public DNS, we are our own authority. The automation is identical.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: local-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: book-labs-local-ca
  secretName: local-ca-secret
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: local-ca
spec:
  ca:
    secretName: local-ca-secret
