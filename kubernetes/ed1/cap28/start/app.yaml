# The shop behind the doorman, and a client that will check its passport.
# The tlsclient mounts the shop-tls secret (created by cert-manager once the
# Ingress asks for a certificate), so it can validate HTTPS against our CA.
# It stays pending until that secret exists — which is the point.
apiVersion: v1
kind: Namespace
metadata:
  name: web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shop
  namespace: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shop
  template:
    metadata:
      labels:
        app: shop
    spec:
      containers:
        - name: shop
          image: busybox:stable
          command: ["sh", "-c", "mkdir -p /www; echo 'secure shop' > /www/index.html; httpd -f -p 8080 -h /www"]
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: shop
  namespace: web
spec:
  selector:
    app: shop
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Pod
metadata:
  name: tlsclient
  namespace: web
spec:
  containers:
    - name: c
      image: curlimages/curl:8.11.1
      command: ["sleep", "infinity"]
      volumeMounts:
        - name: ca
          mountPath: /ca
  volumes:
    - name: ca
      secret:
        secretName: shop-tls
