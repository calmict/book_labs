apiVersion: v1
kind: Pod
metadata:
  name: condo
spec:
  volumes:
    - name: www
      emptyDir: {}
  containers:
    - name: web
      image: busybox:stable
      command: ["httpd", "-f", "-p", "8080", "-h", "/www"]
      volumeMounts:
        - name: www
          mountPath: /www
    # TODO: the second tenant — a container named writer (busybox:stable)
