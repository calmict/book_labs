apiVersion: v1
kind: Pod
metadata:
  name: init-demo
spec:
  volumes:
    - name: shared
      emptyDir: {}
  # TODO: the gatekeeper — an initContainer named gatekeeper (alpine:3)
  # that runs: sh -c 'sleep 8; echo ready > /shared/gate'
  # and mounts the shared volume on /shared
  containers:
    - name: app
      image: alpine:3
      command: ["sh", "-c", "cat /shared/gate; sleep infinity"]
      volumeMounts:
        - name: shared
          mountPath: /shared
