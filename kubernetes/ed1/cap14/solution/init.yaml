apiVersion: v1
kind: Pod
metadata:
  name: init-demo
spec:
  volumes:
    - name: shared
      emptyDir: {}
  initContainers:
    - name: gatekeeper
      image: alpine:3
      command: ["sh", "-c", "sleep 8; echo ready > /shared/gate"]
      volumeMounts:
        - name: shared
          mountPath: /shared
  containers:
    - name: app
      image: alpine:3
      command: ["sh", "-c", "cat /shared/gate; sleep infinity"]
      volumeMounts:
        - name: shared
          mountPath: /shared
