# The robot: an identity for a workload, and the pod that wears it.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: robot
---
apiVersion: v1
kind: Pod
metadata:
  name: robot
spec:
  serviceAccountName: robot
  containers:
    - name: robot
      image: curlimages/curl:latest
      command: ["sleep", "infinity"]
