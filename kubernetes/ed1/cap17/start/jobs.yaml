# Two jobs, two fates: one finishes with honour, one earns the right
# to fail for good.
apiVersion: batch/v1
kind: Job
metadata:
  name: countdown
spec:
  template:
    spec:
      # TODO: the restartPolicy a Job demands (hint: Always is forbidden
      # here — ask yourself why)
      containers:
        - name: counter
          image: alpine:3
          command: ["sh", "-c", "for i in 5 4 3 2 1; do echo $i; sleep 1; done; echo liftoff"]
---
apiVersion: batch/v1
kind: Job
metadata:
  name: flaky
spec:
  # TODO: allow exactly 2 retries after the first attempt (backoffLimit)
  template:
    spec:
      # TODO: same restartPolicy as above
      containers:
        - name: flaky
          image: alpine:3
          command: ["sh", "-c", "echo trying and failing...; exit 1"]
