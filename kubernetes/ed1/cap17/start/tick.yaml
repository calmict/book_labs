apiVersion: batch/v1
kind: CronJob
metadata:
  name: tick
spec:
  # TODO: the schedule — every minute (five characters of cron syntax)
  jobTemplate:
    spec:
      template:
        spec:
          # TODO: the restartPolicy (same rule as any Job)
          containers:
            - name: tick
              image: alpine:3
              command: ["sh", "-c", "echo tick at $(date)"]
